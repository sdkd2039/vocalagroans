    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #131926;
            --text-color: #f8fafc;
            --primary-color: #38bdf8;
            --primary-hover: #0ea5e9;
            --text-muted: #64748b;
            --player-bg: #1a2333;

            --desc-text-color: #94a3b8;
            --warning-color: #e67e22;
            --favorite-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Estedad', 'Noto Kufi Arabic', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 15px 40px 15px;
        }

        .container {
            width: 100%;
            max-width: 850px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .boxed-header-container {
            width: 100%;
            height: 280px;
            background-image: linear-gradient(rgba(11, 15, 25, 0.4), rgba(11, 15, 25, 0.75)), url('https://files.catbox.moe/rmqg5t.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 24px;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            position: relative;
        }

        .header-main-logo {
            max-width: 140px;
            height: auto;
            margin-bottom: 12px;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.6));
            pointer-events: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .slogan {
            font-size: 1.25rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
        }

        .warning {
            color: #ff4d4d;
            background: rgba(11, 15, 25, 0.8);
            padding: 6px 18px;
            border-radius: 50px;
            display: inline-block;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid rgba(255, 77, 77, 0.25);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .tabs-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            padding: 0 5px;
        }

        .tab-btn {
            background: var(--card-bg);
            border: 1px solid #1e293b;
            color: var(--text-muted);
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
        }

        .tab-btn:hover {
            border-color: var(--primary-color);
            color: var(--text-color);
        }

        .tab-btn.active {
            background: var(--primary-color);
            color: var(--bg-color);
            border-color: var(--primary-color);
        }

        .tab-btn i {
            font-size: 0.95rem;
        }

        .fav-badge {
            background-color: var(--favorite-color);
            color: #ffffff;
            font-size: 0.72rem;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 50px;
            min-width: 18px;
            height: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--card-bg);
            transition: all 0.2s ease;
        }
        
        .tab-btn.active .fav-badge {
            border-color: var(--primary-color);
        }

        .search-container {
            position: relative;
            margin-bottom: 25px;
            width: 100%;
        }

        .search-input {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid #1e293b;
            border-radius: 14px;
            padding: 15px 45px 15px 15px;
            color: var(--text-color);
            font-size: 0.95rem;

        }

        .search-input:focus {

        }

        .search-icon {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        .audio-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            width: 100%;
        }

        .audio-card {
            background: var(--card-bg);

            border-radius: 18px;
            padding: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);

            flex-direction: column;
            justify-content: space-between;
            gap: 15px;
            width: 100%;
        }

        .audio-layout-top {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .audio-main-content {
            display: flex;
            align-items: flex-start;
            gap: 14px;
        }

        .music-note-icon {
            background: rgba(56, 189, 248, 0.08);
            border: 1px solid rgba(56, 189, 248, 0.15);

            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;

        }

        .audio-info-block {
            display: flex;
            flex-direction: column;
            gap: 4px;

        }

        .audio-title {
            font-size: 1rem;

            overflow: hidden;
            text-overflow: ellipsis;

        .audio-desc-container {
            font-size: 0.8rem;
            font-style: normal;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;

        .desc-label {

        .desc-value {

        .audio-dates-inline {

        .control-left-group {

        .control-btn {
            background: none;
            border: none;
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;

        .btn-loop-toggle {

        .btn-loop-toggle.is-looping { color: var(--primary-color); }

        .btn-fav-toggle {

            color: var(--text-muted);

            height: 32px;
        }

        .btn-fav-toggle.is-fav { color: var(--favorite-color); }

        .btn-download-action {
            width: 38px;
            height: 38px;

        }

            background: var(--primary-color);

        .status-message {
            grid-column: span 2;

            display: flex;

        .social-link.tg:hover { border-color: #38bdf8; }
        .social-link.ig { color: #f43f5e; }
        .social-link.ig:hover { border-color: #f43f5e; }
        
        .social-link.team-site { 
            color: #ffffff; 
            border-color: rgba(255, 255, 255, 0.15);
        }
        .social-link.team-site:hover { border-color: rgba(255, 255, 255, 0.4); }
        .social-link.team-site img {
            width: 25px; 
            height: 25px;

        }

        @media (max-width: 650px) {
            body { padding: 15px 12px 30px 12px; }
            .boxed-header-container { height: 210px; border-radius: 16px; margin-bottom: 20px; width: 100%; }
            .header-main-logo { max-width: 100px; }

            .tabs-container { gap: 6px; justify-content: center; margin-bottom: 15px; }

            .footer-socials { gap: 8px; }

            .social-link.team-site img { width: 18px; height: 18px; }
        }
    </style>

<script>
    const sheetId = '1mvsDJJRJuiDg1s45KwJw7x6dnodiPZck8WNAFz_C8tU';
    
    let categoriesData = { 'آهات': [], 'مؤثرات': [], 'انتقالات': [], 'صوت': [] };
    let randomAllAudio = []; 
    let activePlayers = {};
    let currentTab = 'all'; 
    let favoritesList = JSON.parse(localStorage.getItem('vocal_favs_v2')) || [];

    // دالة لتوليد ID ثابت وموحد معتمد على الرابط فقط لحل مشكلة اختفاء المفضلة
    function generateCleanId(url) {
        return 'audio-' + url.replace(/[^a-zA-Z0-9]/g, '').substr(-15);
    }

    function updateFavBadge() {
        const badge = document.getElementById('favBadge');
        if (badge) {
            badge.textContent = favoritesList.length;
            badge.style.display = favoritesList.length === 0 ? 'none' : 'inline-flex';
        }
    }

    async function fetchSheetData(sheetName) {
        try {
            const queryUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?sheet=${encodeURIComponent(sheetName)}&tqx=out:json&headers=0&cacheBust=${Date.now()}`;
            const res = await fetch(queryUrl);
            const text = await res.text();
            const json = JSON.parse(text.substr(47).slice(0, -2));
            const rows = json.table.rows; 

            return rows.map((row) => {
                const title = row.c[0] ? row.c[0].v : 'بدون عنوان'; 
                const url = row.c[1] ? row.c[1].v : ''; 
                const desc = row.c[2] ? row.c[2].v : 'مؤثر صوتي'; 
                const dateAdded = row.c[3] ? row.c[3].f || row.c[3].v : '';
                const dateUpdated = row.c[4] ? row.c[4].f || row.c[4].v : '';
                const downloadUrl = row.c[5] && row.c[5].v ? row.c[5].v : url; 
                const uniqueId = generateCleanId(url);
                
                return { id: uniqueId, title, url, desc, dateAdded, dateUpdated, downloadUrl, category: sheetName };
            }).filter(item => item.url !== '' && item.url.startsWith('http'));
        } catch (err) {
            console.error(`خطأ في ورقة: ${sheetName}`, err);
            return [];
        }
    }

    async function fetchAllSheetsData() {
        try {
            categoriesData['آهات'] = (await fetchSheetData('آهات')).reverse();
            categoriesData['مؤثرات'] = (await fetchSheetData('مؤثرات')).reverse();
            categoriesData['انتقالات'] = (await fetchSheetData('انتقالات')).reverse();
            categoriesData['صوت'] = (await fetchSheetData('صوت')).reverse();

            let pool = [
                ...categoriesData['آهات'],
                ...categoriesData['مؤثرات'],
                ...categoriesData['انتقالات'],
                ...categoriesData['صوت']
            ];

            let uniquePoolMap = new Map();
            pool.forEach(item => uniquePoolMap.set(item.url, item));
            let uniquePool = Array.from(uniquePoolMap.values());

            randomAllAudio = uniquePool.sort(() => Math.random() - 0.5);

            updateFavBadge();
            renderAudioCards();
        } catch (err) {
            document.getElementById('statusMessage').innerHTML = 'حدث خطأ أثناء تحميل الملفات الصوتية.';
            console.error(err);
        }
    }

    function switchTab(tabName, buttonEl) {
        currentTab = tabName;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        buttonEl.classList.add('active');
        renderAudioCards();
    }

function toggleFavorite(id) {
        // 1. التحقق إذا كان العنصر موجوداً بالفعل أم لا
        if (favoritesList.includes(id)) {
            favoritesList = favoritesList.filter(favId => favId !== id);
        } else {
            favoritesList.push(id);
        }
        
        // 2. حفظ المصفوفة المحدثة في التخزين المحلي
        localStorage.setItem('vocal_favs_v2', JSON.stringify(favoritesList));
        
        // 3. تحديث العداد (الرقم الأحمر) في التبويب فوراً
        updateFavBadge();
        
        // 4. تحديث شكل الزر بشكل سريع في الواجهة
        const favBtn = document.querySelector(`[data-fav-id="${id}"]`);
        if (favBtn) {
            const isFav = favoritesList.includes(id);
            favBtn.classList.toggle('is-fav', isFav);
            
            // تحديث الأيقونة لتصبح ممتلئة أو فارغة
            const iconEl = favBtn.querySelector('i');
            if (iconEl) {
                iconEl.className = isFav ? 'fa-solid fa-heart' : 'fa-regular fa-heart';
            }
        }
        
        // 5. إذا كان المستخدم واقفاً في تبويب المفضلة، نعيد بناء الكروت لإزالة العناصر المحذوفة
        if (currentTab === 'favorites') {
            renderAudioCards();
        }
    }

    function renderAudioCards() {
        const container = document.getElementById('audioContainer');
        container.innerHTML = '';
        const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();

        let listToRender = [];

        if (currentTab === 'all') {
            listToRender = [...randomAllAudio]; 
        } else if (currentTab === 'favorites') {
            let pool = [...categoriesData['آهات'], ...categoriesData['مؤثرات'], ...categoriesData['انتقالات'], ...categoriesData['صوت']];
            listToRender = pool.filter(item => favoritesList.includes(item.id));
            
            let uniqueFavs = new Map();
            listToRender.forEach(item => uniqueFavs.set(item.url, item));
            listToRender = Array.from(uniqueFavs.values());
        } else {
            listToRender = [...categoriesData[currentTab]];
        }

        let filtered = listToRender.filter(item => {
            return item.title.toLowerCase().includes(searchTerm) || item.desc.toLowerCase().includes(searchTerm);
        });

        if (filtered.length === 0) {
            if (currentTab === 'favorites') {
                container.innerHTML = `<div class="status-message">قائمة المفضلة فارغة حالياً. اضغط على القلب لإضافة الصوتيات هنا!</div>`;
            } else {
                container.innerHTML = `<div class="status-message">لا توجد نتائج مطابقة لبحثك في هذا القسم.</div>`;
            }
            return;
        }

        // استخدام DocumentFragment لدمج العناصر دفعة واحدة في الصفحة ومنع البطء
        const fragment = document.createDocumentFragment();

        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = 'audio-card';
            const safeTitle = item.title.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
            const isFav = favoritesList.includes(item.id) ? 'is-fav' : '';
            const favIcon = favoritesList.includes(item.id) ? 'fa-solid fa-heart' : 'fa-regular fa-heart';
            
            let datesHtml = '';
            if (item.dateAdded || item.dateUpdated) {
                datesHtml = `<div class="audio-dates-inline">`;
                if (item.dateAdded) {
                    datesHtml += `<div class="date-item added" title="تاريخ الإضافة"><i class="fa-regular fa-calendar"></i> <span>أضيف: ${item.dateAdded}</span></div>`;
                }
                if (item.dateUpdated) {
                    datesHtml += `<div class="date-item updated" title="تاريخ التحديث"><i class="fa-solid fa-arrows-rotate"></i> <span>حدث: ${item.dateUpdated}</span></div>`;
                }
                datesHtml += `</div>`;
            }
            
            card.innerHTML = `
                <div class="audio-layout-top">
                    <div class="audio-main-content">
                        <div class="music-note-icon"><i class="fa-solid fa-music"></i></div>
                        <div class="audio-info-block">
                            <div class="audio-title">${item.title}</div>
                            <div class="audio-desc-container">
                                <span class="desc-label">الوصف:</span>
                                <span class="desc-value">${item.desc}</span>
                            </div>
                        </div>
                    </div>
                    ${datesHtml}
                </div>
                <div class="player-controls-container">
                    <div class="timeline-container">
                        <div class="timeline" id="timeline-${item.id}" onmousedown="startSeek(event, '${item.id}')" ontouchstart="startSeek(event, '${item.id}')">
                            <div class="progress-bar" id="progress-${item.id}"></div>
                        </div>
                        <div class="time-labels">
                            <span id="current-${item.id}">00:00</span>
                            <span id="duration-${item.id}">00:00</span>
                        </div>
                    </div>
                    <div class="buttons-row">
                        <button class="control-btn btn-play-pause" onclick="togglePlay('${item.id}', '${item.url}')">
                            <i class="fa-solid fa-play" id="icon-${item.id}"></i>
                        </button>
                        <div class="control-left-group">
                            <button class="control-btn btn-fav-toggle ${isFav}" data-fav-id="${item.id}" title="إضافة للمفضلة" onclick="toggleFavorite('${item.id}')">
                                <i class="${favIcon}"></i>
                            </button>
                            <button class="control-btn btn-loop-toggle" id="loop-${item.id}" onclick="toggleLoop('${item.id}')">
                                <i class="fa-solid fa-repeat"></i>
                            </button>
                            <button class="control-btn btn-download-action" data-url="${item.downloadUrl}" data-title="${safeTitle}" onclick="downloadAudio(this)">
                                <i class="fa-solid fa-download"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
            fragment.appendChild(card);
            
            // إصلاح البطء القاتل: نربط الأحداث فقط للمشغل الفيدرالي الشغال حالياً لمنع تحميل الصوت لجميع الكروت في الخلفية بشكل متكرر
            if (activePlayers[item.id]) {
                setupAudioEvents(item.id);
            }
        });

        container.appendChild(fragment);
    }

    function setupAudioEvents(id) {
        const playerObj = activePlayers[id];
        if (!playerObj) return;

        const audio = playerObj.audio;
        const progressBar = document.getElementById(`progress-${id}`);
        const currentTxt = document.getElementById(`current-${id}`);
        const durationTxt = document.getElementById(`duration-${id}`);
        const icon = document.getElementById(`icon-${id}`);

        audio.ontimeupdate = () => {
            if (audio.duration) {
                const percentage = (audio.currentTime / audio.duration) * 100;
                if (progressBar) progressBar.style.width = percentage + '%';
                if (currentTxt) currentTxt.textContent = formatTime(audio.currentTime);
            }
        };

        if (audio.duration) {
            if (durationTxt) durationTxt.textContent = formatTime(audio.duration);
        }

        audio.onloadedmetadata = () => {
            if (durationTxt) durationTxt.textContent = formatTime(audio.duration);
        };

        audio.onended = () => {
            if (!audio.loop) {
                if (icon) icon.className = 'fa-solid fa-play';
                if (progressBar) progressBar.style.width = '0%';
                if (currentTxt) currentTxt.textContent = '00:00';
            }
        };
    }

    function togglePlay(id, url) {
        const icon = document.getElementById(`icon-${id}`);
        
        if (!activePlayers[id]) {
            activePlayers[id] = { audio: new Audio(url) };
            activePlayers[id].audio.preload = "metadata";
        }

        const audio = activePlayers[id].audio;

        Object.keys(activePlayers).forEach(key => {
            if (key !== id && !activePlayers[key].audio.paused) {
                activePlayers[key].audio.pause();
                const otherIcon = document.getElementById(`icon-${key}`);
                if (otherIcon) otherIcon.className = 'fa-solid fa-play';
            }
        });

        setupAudioEvents(id);

        if (audio.paused) {
            audio.play().then(() => {
                if (icon) icon.className = 'fa-solid fa-pause';
            }).catch(err => console.error(err));
        } else {
            audio.pause();
            if (icon) icon.className = 'fa-solid fa-play';
        }
    }

    let isDragging = false;
    let currentActiveId = null;

    function startSeek(e, id) {
        isDragging = true;
        currentActiveId = id;
        processSeek(e, id);
        window.addEventListener('mousemove', handleGlobalMove);
        window.addEventListener('touchmove', handleGlobalMove, { passive: false });
        window.addEventListener('mouseup', stopSeek);
        window.addEventListener('touchend', stopSeek);
    }

    function handleGlobalMove(e) {
        if (!isDragging || !currentActiveId) return;
        if (e.type === 'touchmove') e.preventDefault(); 
        processSeek(e, currentActiveId);
    }

    function processSeek(e, id) {
        if (!activePlayers[id]) return;
        const audio = activePlayers[id].audio;
        const timeline = document.getElementById('timeline-' + id);
        if (!timeline) return;
        
        const rect = timeline.getBoundingClientRect();
        let clientX;
        if (e.touches && e.touches.length > 0) clientX = e.touches[0].clientX;
        else if (e.changedTouches && e.changedTouches.length > 0) clientX = e.changedTouches[0].clientX;
        else clientX = e.clientX;
        
        const width = rect.width;
        const clickXFromRight = rect.right - clientX;
        
        if (width > 0) {
            const percent = Math.min(Math.max(0, clickXFromRight / width), 1);
            const progressBar = document.getElementById('progress-' + id);
            if (progressBar) progressBar.style.width = (percent * 100) + '%';
            const currentTxt = document.getElementById('current-' + id);
            if (currentTxt && audio.duration) currentTxt.textContent = formatTime(percent * audio.duration);
            if (audio.duration) audio.currentTime = percent * audio.duration;
        }
    }

    function stopSeek() {
        isDragging = false;
        currentActiveId = null;
        window.removeEventListener('mousemove', handleGlobalMove);
        window.removeEventListener('touchmove', handleGlobalMove);
        window.removeEventListener('mouseup', stopSeek);
        window.removeEventListener('touchend', stopSeek);
    }

    function toggleLoop(id) {
        if (!activePlayers[id]) return;
        const audio = activePlayers[id].audio;
        audio.loop = !audio.loop;
        const loopBtn = document.getElementById('loop-' + id);
        if (loopBtn) loopBtn.classList.toggle('is-looping', audio.loop);
    }

    function filterAndSearchAudio() {
        renderAudioCards();
    }

    function downloadAudio(btn) {
        const url = btn.getAttribute('data-url');
        const title = btn.getAttribute('data-title');
        const originalContent = btn.innerHTML;
        
        btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i>`;
        btn.disabled = true;
        
        const extension = url.split('.').pop().split(/[?#]/)[0] || 'zip';
        
        fetch(url)
            .then(response => response.blob())
            .then(blob => {
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = blobUrl;
                a.download = `${title}.${extension}`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(blobUrl);
                btn.innerHTML = originalContent;
                btn.disabled = false;
            })
            .catch(() => {
                alert('فشل تحميل الملف، يرجى المحاولة لاحقاً.');
                btn.innerHTML = originalContent;
                btn.disabled = false;
            });
    }

    function formatTime(seconds) {
        if (isNaN(seconds) || !isFinite(seconds)) return "00:00";
        let min = Math.floor(seconds / 60);
        let sec = Math.floor(seconds % 60);
        if (sec < 10) sec = '0' + sec;
        return min + ':' + sec;
    }

    window.onload = fetchAllSheetsData;
</script>
